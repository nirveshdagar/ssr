<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SSR{% endblock %} — Site Server Rotation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C5CE7;
            --primary-light: #A29BFE;
            --primary-bg: rgba(108,92,231,.08);
            --accent-teal: #00B894;
            --accent-teal-bg: rgba(0,184,148,.08);
            --accent-coral: #FF6B6B;
            --accent-coral-bg: rgba(255,107,107,.08);
            --accent-amber: #FDCB6E;
            --accent-amber-bg: rgba(253,203,110,.12);
            --accent-blue: #0984E3;
            --accent-blue-bg: rgba(9,132,227,.08);
            --accent-pink: #FD79A8;
            --accent-pink-bg: rgba(253,121,168,.08);

            --bg: #F0F2F8;
            --card: #FFFFFF;
            --card-hover: #FFFFFF;
            --sidebar-bg: #1A1A2E;
            --sidebar-active: rgba(108,92,231,.15);
            --text: #2D3436;
            --text-secondary: #636E72;
            --text-muted: #B2BEC3;
            --border: #E8ECF4;
            --shadow: 0 2px 12px rgba(0,0,0,.04);
            --shadow-lg: 0 8px 30px rgba(0,0,0,.06);
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px; min-height: 100vh; position: fixed; top: 0; left: 0; z-index: 100;
            background: var(--sidebar-bg);
            display: flex; flex-direction: column;
        }
        .sidebar .brand {
            padding: 1.8rem 1.5rem 1.5rem; display: flex; align-items: center; gap: 12px;
        }
        .brand-icon {
            width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--primary), #a29bfe);
            font-size: 1.2rem; color: #fff;
        }
        .brand-text { color: #fff; font-weight: 800; font-size: 1.05rem; }
        .brand-text small { display: block; font-size: .6rem; color: rgba(255,255,255,.35); font-weight: 500; letter-spacing: 1px; margin-top: 2px; }
        .sidebar .nav { padding: .5rem 0; flex: 1; }
        .sidebar .nav-link {
            color: rgba(255,255,255,.45); padding: .65rem 1.5rem; font-size: .87rem; font-weight: 500;
            display: flex; align-items: center; gap: 12px; margin: 2px 10px; border-radius: var(--radius-sm);
            transition: all .2s;
        }
        .sidebar .nav-link i { font-size: 1.05rem; width: 20px; text-align: center; }
        .sidebar .nav-link:hover { color: rgba(255,255,255,.75); background: rgba(255,255,255,.05); }
        .sidebar .nav-link.active {
            color: #fff; background: var(--sidebar-active); font-weight: 600;
        }
        .sidebar .nav-link.active i { color: var(--primary-light); }

        /* ===== MAIN ===== */
        .main-content { margin-left: 260px; padding: 2rem 2.5rem; min-height: 100vh; }

        /* ===== CARDS ===== */
        .card-s {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            box-shadow: var(--shadow); transition: box-shadow .25s;
        }
        .card-s:hover { box-shadow: var(--shadow-lg); }
        .card-s-static:hover { box-shadow: var(--shadow); }

        /* ===== STAT CARDS ===== */
        .stat-card {
            padding: 1.5rem; border-radius: var(--radius); position: relative; overflow: hidden;
            border: none; box-shadow: none;
        }
        .stat-card .stat-icon {
            width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; margin-bottom: 1rem;
        }
        .stat-card .stat-value { font-size: 1.9rem; font-weight: 800; color: var(--text); line-height: 1; }
        .stat-card .stat-label { font-size: .78rem; font-weight: 500; color: var(--text-muted); margin-top: .4rem; letter-spacing: .3px; }

        .stat-green { background: linear-gradient(135deg, rgba(0,184,148,.08), rgba(85,239,196,.05)); }
        .stat-green .stat-icon { background: var(--accent-teal-bg); color: var(--accent-teal); }
        .stat-blue { background: linear-gradient(135deg, rgba(9,132,227,.08), rgba(116,185,255,.05)); }
        .stat-blue .stat-icon { background: var(--accent-blue-bg); color: var(--accent-blue); }
        .stat-coral { background: linear-gradient(135deg, rgba(255,107,107,.07), rgba(250,177,160,.05)); }
        .stat-coral .stat-icon { background: var(--accent-coral-bg); color: var(--accent-coral); }
        .stat-amber { background: linear-gradient(135deg, rgba(253,203,110,.1), rgba(255,234,167,.06)); }
        .stat-amber .stat-icon { background: var(--accent-amber-bg); color: #E17055; }
        .stat-pink { background: linear-gradient(135deg, rgba(253,121,168,.07), rgba(250,177,160,.05)); }
        .stat-pink .stat-icon { background: var(--accent-pink-bg); color: var(--accent-pink); }

        /* ===== BADGES ===== */
        .badge-s {
            font-size: .68rem; padding: .3em .7em; border-radius: 20px; font-weight: 600;
            letter-spacing: .3px; display: inline-block;
        }
        .badge-live { background: var(--accent-teal-bg); color: #00A884; }
        .badge-pending { background: #F0F2F8; color: var(--text-muted); }
        .badge-error, .badge-terminal_error, .badge-failed, .badge-purchase_failed, .badge-cf_failed { background: var(--accent-coral-bg); color: #E74C3C; }
        .badge-retryable_error { background: var(--accent-amber-bg); color: #E17055; }
        /* Waiting states: pipeline blocked on an external event */
        .badge-manual_action_required, .badge-waiting_dns, .badge-ns_pending_external {
            background: var(--accent-amber-bg); color: #d97706;
        }
        /* Ready states: between-steps checkpoints */
        .badge-ready_for_ssl, .badge-ready_for_content, .badge-zone_active, .badge-ssl_installed {
            background: var(--accent-blue-bg); color: var(--accent-blue);
        }
        .badge-running, .badge-creating, .badge-purchasing, .badge-cf_creating {
            background: var(--accent-blue-bg); color: var(--accent-blue); animation: pulse 2s infinite;
        }
        .badge-purchased, .badge-cf_created, .badge-ns_set, .badge-dns_set,
        .badge-dns_pending, .badge-hosted, .badge-app_created, .badge-ready {
            background: var(--accent-amber-bg); color: #E17055;
        }
        .badge-active { background: var(--accent-teal-bg); color: #00A884; }
        .badge-burned, .badge-dead { background: var(--accent-coral-bg); color: #E74C3C; }
        .badge-inactive { background: #F0F2F8; color: var(--text-muted); }

        /* ===== TABLE ===== */
        .table-s { margin: 0; }
        .table-s thead th {
            background: #F8F9FC; color: var(--text-muted); font-size: .72rem; font-weight: 600;
            letter-spacing: .5px; text-transform: uppercase; border-bottom: 1px solid var(--border);
            padding: .75rem 1rem;
        }
        .table-s td {
            border-bottom: 1px solid #F4F5FA; padding: .7rem 1rem;
            vertical-align: middle; font-size: .87rem; color: var(--text);
        }
        .table-s tbody tr:hover { background: #FAFAFD; }
        .table-s tbody tr:last-child td { border-bottom: none; }

        /* ===== BUTTONS ===== */
        .btn-primary-s {
            background: var(--primary); border: none; color: #fff; font-weight: 600;
            padding: .5rem 1.3rem; border-radius: var(--radius-sm); font-size: .88rem;
            box-shadow: 0 4px 14px rgba(108,92,231,.25); transition: all .25s;
        }
        .btn-primary-s:hover { background: #5A4BD1; color: #fff; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,92,231,.35); }
        .btn-primary-sm { padding: .35rem .85rem; font-size: .82rem; border-radius: 8px; }

        .btn-soft {
            background: #F0F2F8; border: 1px solid var(--border); color: var(--text-secondary);
            padding: .4rem .9rem; border-radius: 8px; font-size: .85rem; font-weight: 500; transition: all .2s;
        }
        .btn-soft:hover { background: #E8ECF4; color: var(--text); }
        .btn-soft-danger { color: #E74C3C; } .btn-soft-danger:hover { background: var(--accent-coral-bg); color: #C0392B; }
        .btn-soft-success { color: #00A884; } .btn-soft-success:hover { background: var(--accent-teal-bg); color: #00896B; }
        .btn-soft-warning { color: #E17055; } .btn-soft-warning:hover { background: var(--accent-amber-bg); color: #D35400; }
        .btn-soft-info { color: var(--accent-blue); } .btn-soft-info:hover { background: var(--accent-blue-bg); color: #0770C2; }

        /* ===== FORMS ===== */
        .form-control, .form-select {
            background: #F8F9FC; border: 1px solid var(--border); color: var(--text);
            border-radius: var(--radius-sm); font-size: .88rem;
        }
        .form-control:focus, .form-select:focus {
            background: #fff; border-color: var(--primary-light); color: var(--text);
            box-shadow: 0 0 0 3px rgba(108,92,231,.1);
        }
        .form-control::placeholder { color: var(--text-muted); }
        .form-label { color: var(--text-secondary); font-size: .8rem; font-weight: 600; margin-bottom: .35rem; }
        .form-check-input:checked { background-color: var(--primary); border-color: var(--primary); }

        /* ===== MODALS ===== */
        .modal-content {
            background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,.12);
        }
        .modal-header { border-bottom: 1px solid var(--border); padding: 1.2rem 1.5rem; }
        .modal-footer { border-top: 1px solid var(--border); padding: 1rem 1.5rem; }
        .modal-title { font-weight: 700; font-size: 1.05rem; }

        /* ===== ALERTS ===== */
        .alert { border-radius: var(--radius-sm); font-size: .88rem; }

        /* ===== MISC ===== */
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }

        .section-title {
            font-size: 1.35rem; font-weight: 800; color: var(--text);
            display: flex; align-items: center; gap: 10px;
        }
        .section-title i { color: var(--primary); font-size: 1.15rem; }

        code { color: var(--primary); background: var(--primary-bg); padding: .15em .4em; border-radius: 5px; font-size: .82em; }

        .log-entry {
            font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: .78rem;
            padding: .45rem .7rem; border-bottom: 1px solid #F4F5FA;
        }
        .log-completed { color: var(--accent-teal); }
        .log-failed { color: var(--accent-coral); }
        .log-running { color: var(--accent-blue); }
        .log-warning { color: #E17055; }

        .password-field { position: relative; }
        .password-field .toggle-vis {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: var(--text-muted); background: none; border: none; padding: 0;
        }
        .password-field .toggle-vis:hover { color: var(--text-secondary); }

        .progress { background: #F0F2F8; border-radius: 10px; }

        .scrollbar-thin::-webkit-scrollbar { width: 5px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #DFE6E9; border-radius: 10px; }

        .text-muted { color: var(--text-muted) !important; }
        a { color: var(--primary); }
        a:hover { color: #5A4BD1; }

        .empty-state { text-align: center; padding: 3rem 1rem; }
        .empty-state i { font-size: 3rem; color: #DFE6E9; }
        .empty-state p { color: var(--text-muted); margin-top: .8rem; }

        @media (max-width: 768px) {
            .sidebar { width: 60px; } .sidebar .brand-text, .sidebar .nav-link span { display: none; }
            .sidebar .nav-link { justify-content: center; padding: .7rem; margin: 2px 5px; }
            .main-content { margin-left: 60px; padding: 1rem; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <div class="brand-icon"><i class="bi bi-arrow-repeat"></i></div>
            <div class="brand-text">SSR<small>SITE SERVER ROTATION</small></div>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/">
                <i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span>
            </a>
            <a class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}" href="/settings">
                <i class="bi bi-gear-fill"></i> <span>Settings</span>
            </a>
            <a class="nav-link {% if request.endpoint == 'domains_page' %}active{% endif %}" href="/domains">
                <i class="bi bi-globe2"></i> <span>Domains</span>
            </a>
            <a class="nav-link {% if request.endpoint == 'servers_page' %}active{% endif %}" href="/servers">
                <i class="bi bi-hdd-rack-fill"></i> <span>Servers</span>
            </a>
            <a class="nav-link {% if request.endpoint == 'cloudflare_page' %}active{% endif %}" href="/cloudflare">
                <i class="bi bi-cloud-fill"></i> <span>Cloudflare</span>
            </a>
<a class="nav-link {% if request.endpoint == 'watcher_page' %}active{% endif %}" href="/watcher">
                <i class="bi bi-eye-fill"></i> <span>Watcher</span>
            </a>
            <a class="nav-link {% if request.endpoint == 'logs_page' %}active{% endif %}" href="/logs">
                <i class="bi bi-terminal-fill"></i> <span>Logs</span>
            </a>
        </nav>
    </div>

    <!-- Main -->
    <div class="main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}{% endif %}{% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.toggle-vis').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = btn.parentElement.querySelector('input');
                input.type = input.type === 'password' ? 'text' : 'password';
                btn.querySelector('i').className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
            });
        });
        {% block extra_js %}{% endblock %}
    </script>
</body>
</html>
