<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SSR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        body { background: #F0F2F8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card {
            background: #fff; border-radius: 20px; padding: 3rem; width: 100%; max-width: 420px;
            box-shadow: 0 8px 30px rgba(0,0,0,.06); border: 1px solid #E8ECF4;
        }
        .brand-icon {
            width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #6C5CE7, #a29bfe); font-size: 1.5rem; color: #fff; margin: 0 auto 1.5rem;
        }
        h2 { font-weight: 800; font-size: 1.4rem; text-align: center; color: #2D3436; }
        p { color: #B2BEC3; text-align: center; font-size: .88rem; }
        .form-control {
            background: #F8F9FC; border: 1px solid #E8ECF4; border-radius: 10px; padding: .7rem 1rem;
        }
        .form-control:focus { border-color: #A29BFE; box-shadow: 0 0 0 3px rgba(108,92,231,.1); background: #fff; }
        .btn-login {
            background: #6C5CE7; border: none; color: #fff; font-weight: 600; width: 100%;
            padding: .7rem; border-radius: 10px; font-size: .95rem;
            box-shadow: 0 4px 14px rgba(108,92,231,.25);
        }
        .btn-login:hover { background: #5A4BD1; color: #fff; }
        .alert { border-radius: 10px; font-size: .88rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-icon"><i class="bi bi-arrow-repeat"></i></div>
        <h2>Site Server Rotation</h2>
        <p class="mb-4">Enter your dashboard password to continue</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
        {% endfor %}{% endif %}{% endwith %}

        <form method="POST">
            <div class="mb-4">
                <input type="password" class="form-control" name="password" placeholder="Dashboard Password" autofocus required>
            </div>
            <button type="submit" class="btn btn-login">Sign In</button>
        </form>
        <p class="mt-3 mb-0" style="font-size:.78rem;">Set password in Settings. No password = open access.</p>
    </div>
</body>
</html>
